name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        run: go test -v ./...

      - name: Compile Windows resource (icon)
        shell: pwsh
        run: |
          $windres = (Get-Command windres -ErrorAction SilentlyContinue).Source
          if (-not $windres) {
            $windres = "C:\msys64\mingw64\bin\windres.exe"
          }
          Push-Location icons
          & $windres app.rc -o ../app_windows.syso
          Pop-Location

      - name: Build binary
        env:
          CGO_ENABLED: 1
        run: go build -o IncottDriver.exe -ldflags="-H windowsgui -s -w -X main.version=${{ github.ref_name }}" .

      - name: Extract tag annotation
        id: tag
        shell: bash
        run: |
          MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if [ -z "$MSG" ]; then
            MSG="Release ${{ github.ref_name }}"
          fi
          {
            echo 'body<<RELEASE_BODY_EOF'
            echo "$MSG"
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: IncottDriver.exe
          body: ${{ steps.tag.outputs.body }}
          draft: false
          prerelease: false
